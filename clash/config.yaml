    tolerance: 50
    filter: "(?i)墨西哥|巴拿马|百慕大|格陵兰|格林纳达|哥斯达黎加|英属维尔京|美属维尔京|巴西|智利|秘鲁|古巴|阿根廷|乌拉圭|巴拉圭|牙买加|苏里南|巴哈马|圭亚那|法属圭亚那|伯利兹|蒙特塞拉特|荷属阿鲁巴|荷属库拉索|圣马丁|圣巴泰勒米|瓜德罗普|马提尼克|安提瓜|圣基茨|特立尼达|圣文森特|圣卢西亚|哥伦比亚|厄瓜多尔|委内瑞拉|玻利维亚|危地马拉|萨尔瓦多|波多黎各|开曼群岛|洪都拉斯|尼加拉瓜|多米尼克|多米尼加|巴巴多斯|福克兰|特克斯|圣皮埃尔|海地"
  - name: 🕌 中东节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)阿联酋|沙特|土耳其|伊朗|伊拉克|以色列|巴勒斯坦|约旦|黎巴嫩|叙利亚|科威特|卡塔尔|巴林|阿曼|也门"
  - name: 🌍 非洲节点
