# Clash(Mihomo) comprehensive config adapted from the original source config.
# Keep shared local rules in rules/*.yaml and regenerate with scripts/build_rules.py.

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

experimental:
  ignore-resolve-fail: true

global-client-fingerprint: chrome

sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - ntp.*.com
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - +.pool.ntp.org
    - localhost.ptlogin2.qq.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.xboxlive.com
    - msftconnecttest.com
    - xbox.*.microsoft.com
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.github.com
  respect-rules: true

pr: &global_select
  type: select
  proxies:
    - ♻️ 自动选择
    - 🚀 手动切换
    - 🇭🇰 香港节点
    - 🇲🇴 澳门节点
    - 🇯🇵 日本节点
    - 🇺🇲 美国节点
    - 🇨🇳 台湾节点
    - 🇸🇬 狮城节点
    - 🇰🇷 韩国节点
    - 🇬🇧 英国节点
    - 🇪🇺 欧洲节点
    - 🇨🇦 加拿大节点
    - 🇦🇺 澳洲节点
    - 🇳🇿 新西兰节点
    - 🏝️ 大洋洲节点
    - 🌎 南美节点
    - 🕌 中东节点
    - 🌍 非洲节点
    - 🇦🇶 南极节点
    - 🌏 东南亚节点
    - 🌏 中亚节点
    - 🌐 故障转移
    - DIRECT
p: &provider_base
  type: http
  interval: 86400
  health-check:
    enable: true
    url: http://www.gstatic.com/generate_204
    interval: 1800
    timeout: 5000
    lazy: true
auto: &auto_group
  type: url-test
  lazy: true
  url: http://www.gstatic.com/generate_204
  interval: 1800
  tolerance: 50
  timeout: 5000
  use: [Sub]
use: &use_group
  type: select
  use: [Sub]
fallback: &fallback_group
  type: fallback
  lazy: true
  url: http://www.gstatic.com/generate_204
  interval: 1800
  timeout: 5000
  use: [Sub]

proxy-providers:
  Sub:
    <<: *provider_base
    url: "https://example.com/subscription.yaml?token=replace-me"
    path: ./cache/proxy-providers/sub.yaml
    override:
      additional-prefix: "[机场]"
      additional-suffix: ""
    exclude-filter: "(?i)剩余|到期|过期|官网|产品|平台|网站|备用|频道|群|测试|实验"
    include-all: true

proxy-groups:
  - name: 🚀 手动切换
    <<: *use_group
  - name: 🌏 全球加速
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇲🇴 澳门节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇰🇷 韩国节点
      - 🇬🇧 英国节点
      - 🇪🇺 欧洲节点
      - 🇨🇦 加拿大节点
      - 🇦🇺 澳洲节点
      - 🇳🇿 新西兰节点
      - 🏝️ 大洋洲节点
      - 🌎 南美节点
      - 🕌 中东节点
      - 🌍 非洲节点
      - 🇦🇶 南极节点
      - 🌏 东南亚节点
      - 🌏 中亚节点
      - 🔄 备用线路
      - DIRECT
  - name: 🎬 流媒体
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇬🇧 英国节点
      - 🇯🇵 日本节点
      - 🌎 南美节点
      - 🔄 备用线路
  - name: 📺 哔哩哔哩
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🚀 手动切换, ♻️ 自动选择]
  - name: 🌐 社交平台
    type: select
    proxies: [🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇬🇧 英国节点, 🌎 南美节点, 🌏 东南亚节点, 🔄 备用线路]
  - name: 🤖 人工智能
    type: select
    proxies: [🇺🇲 美国节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇬🇧 英国节点, 🔄 备用线路]
  - name: 🎮 游戏平台
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇰🇷 韩国节点, 🌎 南美节点, 🌏 东南亚节点, 🇬🇧 英国节点, 🇪🇺 欧洲节点]
  - name: 👨‍💻 开发服务
    type: select
    proxies: [🇺🇲 美国节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇬🇧 英国节点, DIRECT]
  - name: 💰 加密货币
    type: select
    proxies: [🇰🇷 韩国节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇬🇧 英国节点, 🇦🇺 澳洲节点, DIRECT]
  - name: 🎙️ 商务协作
    type: select
    proxies: [🇺🇲 美国节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, DIRECT]
  - name: 🛒 电商支付
    type: select
    proxies: [🇺🇲 美国节点, 🇸🇬 狮城节点, 🇬🇧 英国节点, 🇯🇵 日本节点, DIRECT]
  - name: 🍎 苹果服务
    type: select
    proxies: [DIRECT, 🇺🇲 美国节点, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点]
  - name: 🌌 谷歌服务
    type: select
    proxies: [🇺🇲 美国节点, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🔄 备用线路]
  - name: Ⓜ️ 微软服务
    type: select
    proxies: [🇺🇲 美国节点, 🇭🇰 香港节点, 🇸🇬 狮城节点, DIRECT]
  - name: 🇨🇳 国内服务
    type: select
    proxies: [DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点]
  - name: 📡 网络测速
    type: select
    proxies: [♻️ 自动选择, DIRECT]
  - name: 🛡️ 安全防护
    type: select
    proxies: [REJECT, DIRECT]
  - name: 🐟 兜底分流
    <<: *global_select
  - name: ♻️ 自动选择
    <<: *auto_group
  - name: 🌐 故障转移
    <<: *fallback_group
    filter: ".*"
  - name: 🔄 备用线路
    type: select
    proxies: [♻️ 自动选择, 🌐 故障转移, DIRECT]
  - name: 🇭🇰 香港节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)港|hk|hongkong|hong kong"
  - name: 🇲🇴 澳门节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)澳门|macao|macau"
  - name: 🇨🇳 台湾节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)台|tw|taiwan"
  - name: 🇯🇵 日本节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)日本|jp|japan"
  - name: 🇰🇷 韩国节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)韩|kr|korea"
  - name: 🇺🇲 美国节点
    type: select
    use: [Sub]
    filter: "(?i)美国|us|unitedstates|united states"
  - name: 🇸🇬 狮城节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)新加坡|狮城|sg|singapore"
  - name: 🇬🇧 英国节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)英|uk|britain|united kingdom"
  - name: 🇨🇦 加拿大节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)加拿大|ca|canada"
  - name: 🇦🇺 澳洲节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)澳大利亚|澳洲|au|australia"
  - name: 🇳🇿 新西兰节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)新西兰|new zealand"
  - name: 🌏 东南亚节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)马来|泰国|越南|菲律宾|印尼|印度|马尔代夫|柬埔寨|缅甸|老挝|孟加拉|尼泊尔|斯里兰卡|不丹|阿富汗|巴基斯坦|文莱|东帝汶"
