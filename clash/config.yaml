    tolerance: 50
    filter: "(?i)法国|德国|荷兰|意大利|西班牙|瑞士|俄罗斯|丹麦|挪威|瑞典|芬兰|捷克|波兰|比利时|奥地利|匈牙利|斯洛伐克|斯洛文尼亚|克罗地亚|波黑|塞尔维亚|黑山|北马其顿|阿尔巴尼亚|保加利亚|罗马尼亚|乌克兰|白俄罗斯|立陶宛|拉脱维亚|爱沙尼亚|冰岛|爱尔兰|葡萄牙|希腊|马耳他|塞浦路斯|卢森堡|摩纳哥|安道尔|圣马力诺|梵蒂冈|列支敦士登|摩尔多瓦|格鲁吉亚|亚美尼亚|阿塞拜疆|直布罗陀|法罗群岛|奥兰群岛|马恩岛|根西岛|泽西岛"
  - name: 🏝️ 大洋洲节点
    <<: *fallback_group
    tolerance: 50
    filter: "(?i)斐济|巴布亚新几内亚|新喀里多尼亚|法属波利尼西亚|萨摩亚|汤加|瓦努阿图|所罗门群岛|基里巴斯|瑙鲁|帕劳|密克罗尼西亚|马绍尔群岛|关岛|美属萨摩亚|北马里亚纳|库克群岛|纽埃|诺福克岛|托克劳|瓦立斯"
  - name: 🌎 南美节点
