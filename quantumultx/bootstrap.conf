# Quantumult X Bootstrap 配置
# 主配置文件入口

[general]
# 网络检查
server_check_url=http://www.google.com/generate_204
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js

[dns]
# DNS 配置
server=223.5.5.5
server=119.29.29.29
server=8.8.8.8

[policy]
# 策略组
static=PROXY, 自动选择, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
static=自动选择, url-latency-benchmark, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
static=DIRECT, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Direct.png
static=REJECT, reject, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png

[server_remote]
# 在这里添加你的订阅链接
# https://example.com/subscribe?token=xxx, tag=我的节点, update-interval=86400, opt-parser=true, enabled=true

[filter_remote]
# 远程规则
https://raw.githubusercontent.com/yourname/proxy-config/main/quantumultx/filter_remote.snippet, tag=自定义规则, update-interval=86400, opt-parser=false, enabled=true

[rewrite_remote]
# 重写规则
https://raw.githubusercontent.com/yourname/proxy-config/main/quantumultx/rewrite_remote.snippet, tag=自定义重写, update-interval=86400, opt-parser=false, enabled=true

[task_local]
# 定时任务

[http_backend]
# HTTP 后端

[mitm]
# MITM 配置
passphrase=
p2=
hostname=
